name: Feature request
description: Suggest an endpoint, helper, or improvement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What's the problem?
      description: What are you trying to do that's hard or impossible today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would the ideal API or behavior look like?
    validations:
      required: false
