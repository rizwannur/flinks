name: Bug report
description: Something isn't working as documented
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect, and what actually happened?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: A minimal code snippet that triggers the issue.
      render: ts
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Package version
      placeholder: "@rizwannur/flinks@0.1.0"
    validations:
      required: true
  - type: input
    id: runtime
    attributes:
      label: Runtime
      placeholder: "Node 20.11 / Bun 1.1"
    validations:
      required: true
