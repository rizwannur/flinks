name: Release

# Fires when you push a version tag, e.g. `git tag v0.1.0 && git push --tags`.
on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write # create the GitHub Release

jobs:
  publish:
    name: Publish to npm + GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify
        run: |
          bun run typecheck
          bun run test

      # Node/npm are used for the actual publish so we get npm provenance.
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Build
        run: bun run build

      - name: Guard — tag must match package.json version
        run: |
          PKG=$(node -p "require('./package.json').version")
          TAG=${GITHUB_REF_NAME#v}
          if [ "$PKG" != "$TAG" ]; then
            echo "::error::Tag v$TAG does not match package.json version $PKG"
            exit 1
          fi

      - name: Publish to npm
        # Provenance is intentionally omitted — it requires a public repo.
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --generate-notes --title "$GITHUB_REF_NAME"
